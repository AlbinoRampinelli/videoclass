services:
  app:
    env_file:
      - .env.production
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videoclass_app
    restart: always
    ports:
      - "3007:3000"
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - dds

networks:
  dds:
    external: true

volumes:
  uploads_data:

